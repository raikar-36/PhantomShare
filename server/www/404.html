<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | SecureShare</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0B1929 0%, #132F4C 50%, #1a3a5c 100%);
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .code {
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 800;
      letter-spacing: -.04em;
      background: linear-gradient(135deg, #64B5F6, #43A047);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
    p { color: rgba(255,255,255,.6); font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      background: linear-gradient(135deg, #43A047, #66BB6A);
      color: #fff;
      text-decoration: none;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(67,160,71,.4);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(67,160,71,.5); }
    .btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Go to Homepage
    </a>
  </div>
</body>
</html>
